name: Financial Intelligence Ingest

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
      timezone: "America/New_York"
  push:
    branches: [ "main" ]
  workflow_dispatch: # This adds the 'Run workflow' button in GitHub

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python -m src.collector
        
      - name: Run Tests
        env:
          # Pass secrets so integration tests can talk to Supabase if needed
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: pytest tests/